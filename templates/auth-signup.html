<html lang="en">

  <head>
    <meta charset="utf-8" />
    <title>Sign Up | Mirbal Admin & Dashboard Template</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta content="Bootstrap Admin & Dashboard Template" name="description" />
    <meta content="SRBThemes" name="author" />

    <!-- layout setup -->
    <script type="module" src="../static/assets/js/layout-setup.js"></script>

    <!-- App favicon -->
    <link rel="shortcut icon" href="../static/assets/images/favicon.png" />
    <!-- Simplebar Css -->
    <link
      rel="stylesheet"
      href="../static/assets/libs/simplebar/simplebar.min.css"
    />

    <!-- Swiper Css -->
    <link
      href="../static/assets/libs/swiper/swiper-bundle.min.css"
      rel="stylesheet"
    />

    <!-- Nouislider Css -->
    <link
      href="../static/assets/libs/nouislider/nouislider.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Css -->
    <link
      href="../static/assets/css/bootstrap.min.css"
      id="bootstrap-style"
      rel="stylesheet"
      type="text/css"
    />

    <!--icons css-->
    <link
      href="../static/assets/css/icons.min.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- App Css-->
    <link
      href="../static/assets/css/app.min.css"
      id="app-style"
      rel="stylesheet"
      type="text/css"
    />
  </head>

  <body>
    <div
      class="min-vh-100 d-flex align-items-center justify-content-center px-5 py-10 auth-bg"
    >
      <div
        class="main-wrapper border bg-white rounded-4 d-flex flex-column flex-lg-row gap-xl-5 position-relative overflow-hidden w-100 shadow"
      >
        <div
          class="decoration-section m-5 bg-dark-subtle rounded-3 me-0 mb-0 mb-lg-5"
        ></div>
        <div class="login-section bg-white rounded-4 p-6 px-xl-12">
          <a
            href="index-2.html"
            class="d-flex justify-content-end align-items-center gap-2 logo-main mt-lg-2 mb-10"
          >
            <img
              height="33"
              width="33"
              class="logo-dark"
              alt="Dark Logo"
              src="../static/assets/images/logo-md.png"
            />
            <h3 class="mb-0 lh-base fw-semibold">Mirbal</h3>
          </a>
          <div class="mb-8">
            <h5 class="mb-2">Join Mirbal Now</h5>
            <p class="text-muted mb-0">
              It only takes a moment to create your account
            </p>
          </div>
          <form>
            <div class="mb-4">
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Username"
                required
              />
            </div>
            <div class="mb-4">
              <input
                type="text"
                class="form-control"
                id="email"
                placeholder="Email"
                required
              />
            </div>
            <div class="mb-4">
              <div class="position-relative">
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Password"
                  required
                />
                <button
                  type="button"
                  class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password"
                  id="toggle-password"
                  data-target="password"
                >
                  <i class="ri-eye-off-line align-middle"></i>
                </button>
              </div>
            </div>
            <div class="mb-4">
              <div class="position-relative">
                <input
                  type="password"
                  class="form-control"
                  id="ConfirmPassword"
                  placeholder="Confirm Password"
                  required
                />
                <button
                  type="button"
                  class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password"
                  id="toggle-password"
                  data-target="ConfirmPassword"
                >
                  <i class="ri-eye-off-line align-middle"></i>
                </button>
              </div>
            </div>
            <div class="mb-10">
              <div class="d-flex justify-content-between align-items-center">
                <div class="form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="rememberMe"
                  />
                  <label class="form-check-label" for="rememberMe"
                    >Remember me</label
                  >
                </div>
              </div>
            </div>
            <div class="text-center mb-5">
              <button type="button" class="btn btn-primary w-100">
                Create An Account
              </button>
            </div>
          </form>
          <p class="text-center text-muted fs-14 my-6">
            Already have an account?
            <a href="auth-signin.html" class="link link-primary">Sign In</a>
          </p>
          <div
            class="d-flex flex-wrap flex-md-nowrap align-items-center justify-content-center gap-2"
          >
            <button
              type="button"
              class="btn btn-outline-light text-black d-flex align-items-center gap-2"
            >
              <img
                src="../static/assets/images/auth/google-icon.svg"
                alt="Google"
                class="w-16px"
              />Sign in via Google
            </button>
            <button
              type="button"
              class="btn btn-outline-light text-black d-flex align-items-center gap-2"
            >
              <img
                src="../static/assets/images/auth/apple-black.svg"
                alt="Google"
                class="w-16px"
              />Sign in via Apple
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Swiper bundle js -->
    <script src="../static/assets/libs/swiper/swiper-bundle.min.js"></script>

    <!-- Bootstrap bundle js -->
    <script src="../static/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- simplebar js -->
    <script src="../static/assets/libs/simplebar/simplebar.min.js"></script>

    <!-- Scroll Top init -->
    <script src="../static/assets/js/scroll-top.init.js"></script>
    <!-- Gsap Animation -->
    <script src="../static/assets/libs/gsap/gsap.min.js"></script>
    <script src="../static/cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="../static/cdn.jsdelivr.net/gh/robin-dela/hover-effect%40latest/dist/hover-effect.umd.js"></script>

    <!-- Common init -->
    <script src="../static/assets/js/pages/common.init.js"></script>

    <!-- Auth init -->
    <script src="../static/assets/js/auth/auth.init.js"></script>
  </body>
